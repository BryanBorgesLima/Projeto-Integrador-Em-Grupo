<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bella Tavola - Cardápio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/estilos.css">
  <link rel="stylesheet" href="../css/paginas.css">
</head>
<body class="pagina-cardapio">

  <header class="cabecalho">
    <div class="container">
      <a href="../index.html" class="logo">Bella <span>Tavola</span></a>
      <nav class="nav-cliente">
        <a href="../index.html">Início</a>
        <a href="cardapio.html" class="ativo">Cardápio</a>
        <a href="carrinho.html" class="link-carrinho">
          🛒
          <span id="contador-carrinho" class="contador-carrinho">0</span>
        </a>
      </nav>
    </div>
  </header>

  <section class="secao">
    <div class="container">
      <h2 class="titulo-secao">Nosso Cardápio</h2>
      <p class="subtitulo-secao">Escolha uma categoria e monte seu pedido</p>

      <!-- As abas de categoria são criadas pelo JavaScript a partir do array de categorias -->
      <div id="abas-categorias" class="abas-categorias"></div>

      <!-- Grid de produtos da categoria selecionada -->
      <div id="grid-produtos" class="grid-produtos"></div>
    </div>
  </section>

  <footer class="rodape">
    <p>Bella Tavola &copy; 2026 - Trabalho escolar de HTML, CSS e JavaScript</p>
  </footer>

  <!-- Avisinho que aparece quando um produto é adicionado ao carrinho -->
  <div id="toast" class="toast">Item adicionado ao carrinho! 🛒</div>

  <script src="../js/dados.js"></script>
  <script src="../js/armazenamento.js"></script>
  <script src="../js/cardapio.js"></script>
</body>
</html>
