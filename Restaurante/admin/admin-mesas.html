<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Mesas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

  <nav class="nav-admin">
    <div class="container">
      <a href="../admin.html" class="logo">Bella <span>Tavola</span> Admin</a>
      <ul class="links-admin">
        <li><a href="../admin.html">Painel</a></li>
        <li><a href="admin-produtos.html">Produtos</a></li>
        <li><a href="admin-categorias.html">Categorias</a></li>
        <li><a href="admin-pedidos.html">Pedidos</a></li>
        <li><a href="admin-mesas.html" class="ativo">Mesas</a></li>
        <li><a href="admin-relatorios.html">Relatórios</a></li>
        <li><a href="../index.html" class="voltar-site">Ver Site</a></li>
      </ul>
    </div>
  </nav>

  <main class="conteudo-admin">
    <div class="container">
      <h1 class="titulo-pagina">Controle de Mesas</h1>

      <div class="grade-admin">

        <div class="cartao">
          <h2 id="titulo-formulario">Nova Mesa</h2>
          <form id="form-mesa" onsubmit="salvarMesa(event)">
            <input type="hidden" id="mesa-id">

            <div class="grupo-campo">
              <label for="mesa-numero">Número da mesa</label>
              <input type="number" id="mesa-numero" min="1" required>
            </div>

            <div class="grupo-campo">
              <label for="mesa-lugares">Quantidade de lugares</label>
              <input type="number" id="mesa-lugares" min="1" required>
            </div>

            <div class="grupo-campo">
              <label for="mesa-status">Status</label>
              <select id="mesa-status">
                <option value="livre">Livre</option>
                <option value="ocupada">Ocupada</option>
                <option value="reservada">Reservada</option>
              </select>
            </div>

            <button type="submit" class="btn btn-primario">Salvar Mesa</button>
            <button type="button" class="btn btn-secundario" onclick="limparFormulario()">Cancelar</button>
          </form>
        </div>

        <div class="cartao">
          <h2>Mesas Cadastradas</h2>
          <table class="tabela-admin">
            <thead>
              <tr>
                <th>Mesa</th>
                <th>Lugares</th>
                <th>Status</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="tabela-mesas"></tbody>
          </table>
        </div>

      </div>
    </div>
  </main>

  <div id="toast" class="toast">Salvo com sucesso!</div>

  <script src="../js/dados.js"></script>
  <script src="../js/armazenamento.js"></script>
  <script src="../js/admin-mesas.js"></script>
</body>
</html>
