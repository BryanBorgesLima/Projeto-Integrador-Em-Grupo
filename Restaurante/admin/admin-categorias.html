<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Categorias</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

  <nav class="nav-admin">
    <div class="container">
      <a href="../admin.html" class="logo">Bella <span>Tavola</span> Admin</a>
      <ul class="links-admin">
        <li><a href="../admin.html">Painel</a></li>
        <li><a href="admin-produtos.html">Produtos</a></li>
        <li><a href="admin-categorias.html" class="ativo">Categorias</a></li>
        <li><a href="admin-pedidos.html">Pedidos</a></li>
        <li><a href="admin-mesas.html">Mesas</a></li>
        <li><a href="admin-relatorios.html">Relatórios</a></li>
        <li><a href="../index.html" class="voltar-site">Ver Site</a></li>
      </ul>
    </div>
  </nav>

  <main class="conteudo-admin">
    <div class="container">
      <h1 class="titulo-pagina">Cadastro de Categorias</h1>

      <div class="grade-admin">

        <div class="cartao">
          <h2 id="titulo-formulario">Nova Categoria</h2>
          <form id="form-categoria" onsubmit="salvarCategoria(event)">
            <input type="hidden" id="categoria-id">

            <div class="grupo-campo">
              <label for="categoria-nome">Nome</label>
              <input type="text" id="categoria-nome" required>
            </div>

            <div class="grupo-campo">
              <label for="categoria-icone">Ícone (emoji)</label>
              <input type="text" id="categoria-icone" maxlength="2" placeholder="🍕" required>
            </div>

            <button type="submit" class="btn btn-primario">Salvar Categoria</button>
            <button type="button" class="btn btn-secundario" onclick="limparFormulario()">Cancelar</button>
          </form>
        </div>

        <div class="cartao">
          <h2>Categorias Cadastradas</h2>
          <table class="tabela-admin">
            <thead>
              <tr>
                <th>Ícone</th>
                <th>Nome</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="tabela-categorias"></tbody>
          </table>
        </div>

      </div>
    </div>
  </main>

  <div id="toast" class="toast">Salvo com sucesso!</div>

  <script src="../js/dados.js"></script>
  <script src="../js/armazenamento.js"></script>
  <script src="../js/admin-categorias.js"></script>
</body>
</html>
