<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Pedidos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

  <nav class="nav-admin">
    <div class="container">
      <a href="../admin.html" class="logo">Bella <span>Tavola</span> Admin</a>
      <ul class="links-admin">
        <li><a href="../admin.html">Painel</a></li>
        <li><a href="admin-produtos.html">Produtos</a></li>
        <li><a href="admin-categorias.html">Categorias</a></li>
        <li><a href="admin-pedidos.html" class="ativo">Pedidos</a></li>
        <li><a href="admin-mesas.html">Mesas</a></li>
        <li><a href="admin-relatorios.html">Relatórios</a></li>
        <li><a href="../index.html" class="voltar-site">Ver Site</a></li>
        <li><button type="button" id="botao-tema" class="botao-tema" onclick="alternarTema()" title="Alternar tema claro/escuro">🌙</button></li>
      </ul>
    </div>
  </nav>

  <main class="conteudo-admin">
    <div class="container">
      <h1 class="titulo-pagina">Gerenciamento de Pedidos</h1>

      <!-- Filtro de pedidos por status -->
      <div class="filtros-status" id="filtros-status">
        <button class="filtro-status ativo" onclick="filtrarPedidos('todos', this)">Todos</button>
        <button class="filtro-status" onclick="filtrarPedidos('pendente', this)">Pendente</button>
        <button class="filtro-status" onclick="filtrarPedidos('preparando', this)">Preparando</button>
        <button class="filtro-status" onclick="filtrarPedidos('pronto', this)">Pronto</button>
        <button class="filtro-status" onclick="filtrarPedidos('entregue', this)">Entregue</button>
      </div>

      <div class="cartao">
        <table class="tabela-admin">
          <thead>
            <tr>
              <th>Pedido</th>
              <th>Cliente</th>
              <th>Tipo</th>
              <th>Itens</th>
              <th>Total</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tabela-pedidos"></tbody>
        </table>
      </div>
    </div>
  </main>

  <div id="toast" class="toast">Status atualizado!</div>

  <script src="../js/dados.js"></script>
  <script src="../js/armazenamento.js"></script>
  <script src="../js/tema.js"></script>
  <script src="../js/admin-pedidos.js"></script>
</body>
</html>
