<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Produtos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

  <nav class="nav-admin">
    <div class="container">
      <a href="../admin.html" class="logo">Bella <span>Tavola</span> Admin</a>
      <ul class="links-admin">
        <li><a href="../admin.html">Painel</a></li>
        <li><a href="admin-produtos.html" class="ativo">Produtos</a></li>
        <li><a href="admin-categorias.html">Categorias</a></li>
        <li><a href="admin-pedidos.html">Pedidos</a></li>
        <li><a href="admin-mesas.html">Mesas</a></li>
        <li><a href="admin-relatorios.html">Relatórios</a></li>
        <li><a href="../index.html" class="voltar-site">Ver Site</a></li>
        <li><button type="button" id="botao-tema" class="botao-tema" onclick="alternarTema()" title="Alternar tema claro/escuro">🌙</button></li>
      </ul>
    </div>
  </nav>

  <main class="conteudo-admin">
    <div class="container">
      <h1 class="titulo-pagina">Cadastro de Produtos</h1>

      <div class="grade-admin">

        <!-- Formulário de cadastro/edição -->
        <div class="cartao">
          <h2 id="titulo-formulario">Novo Produto</h2>
          <form id="form-produto" onsubmit="salvarProduto(event)">
            <input type="hidden" id="produto-id">

            <div class="grupo-campo">
              <label for="produto-nome">Nome</label>
              <input type="text" id="produto-nome" required>
            </div>

            <div class="grupo-campo">
              <label for="produto-categoria">Categoria</label>
              <select id="produto-categoria" required></select>
            </div>

            <div class="linha-campos">
              <div class="grupo-campo">
                <label for="produto-preco">Preço (R$)</label>
                <input type="number" id="produto-preco" step="0.10" min="0" required>
              </div>
              <div class="grupo-campo">
                <label for="produto-emoji">Emoji</label>
                <input type="text" id="produto-emoji" maxlength="2" placeholder="🍕" required>
              </div>
            </div>

            <div class="grupo-campo">
              <label for="produto-descricao">Descrição</label>
              <textarea id="produto-descricao" rows="3"></textarea>
            </div>

            <div class="grupo-campo">
              <label><input type="checkbox" id="produto-disponivel" checked> Disponível no cardápio</label>
            </div>

            <button type="submit" class="btn btn-primario">Salvar Produto</button>
            <button type="button" class="btn btn-secundario" onclick="limparFormulario()">Cancelar</button>
          </form>
        </div>

        <!-- Lista de produtos cadastrados -->
        <div class="cartao">
          <h2>Produtos Cadastrados</h2>
          <table class="tabela-admin">
            <thead>
              <tr>
                <th>Emoji</th>
                <th>Nome</th>
                <th>Categoria</th>
                <th>Preço</th>
                <th>Disponível</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="tabela-produtos">
              <!-- Linhas inseridas pelo admin-produtos.js -->
            </tbody>
          </table>
        </div>

      </div>
    </div>
  </main>

  <div id="toast" class="toast">Salvo com sucesso!</div>

  <script src="../js/dados.js"></script>
  <script src="../js/armazenamento.js"></script>
  <script src="../js/tema.js"></script>
  <script src="../js/admin-produtos.js"></script>
</body>
</html>
