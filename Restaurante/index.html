<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bella Tavola - Página Inicial</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/estilos.css">
  <link rel="stylesheet" href="css/paginas.css">
</head>
<body class="pagina-inicio">

  <!-- Cabeçalho com a navegação do cliente -->
  <header class="cabecalho">
    <div class="container">
      <a href="index.html" class="logo">Bella <span>Tavola</span></a>
      <nav class="nav-cliente">
        <a href="index.html" class="ativo">Início</a>
        <a href="cliente/cardapio.html">Cardápio</a>
        <a href="cliente/carrinho.html" class="link-carrinho">
          🛒
          <span id="contador-carrinho" class="contador-carrinho">0</span>
        </a>
      </nav>
    </div>
  </header>

  <!-- Seção de boas-vindas (hero) -->
  <section class="hero">
    <div class="container">
      <h1>Sabores que contam histórias</h1>
      <p>Pratos preparados com carinho, ingredientes frescos e muita tradição italiana.</p>
      <div class="grupo-botoes-hero">
        <a href="cliente/cardapio.html" class="btn btn-primario">Ver Cardápio</a>
        <a href="cliente/resumo.html" class="btn btn-secundario">Fazer Pedido</a>
      </div>
    </div>
  </section>

  <!-- Produtos em destaque, montados dinamicamente pelo JavaScript -->
  <section class="secao destaques">
    <div class="container">
      <h2 class="titulo-secao">Destaques da Casa</h2>
      <p class="subtitulo-secao">Alguns dos pratos preferidos dos nossos clientes</p>
      <div id="grid-destaques" class="grid-produtos">
        <!-- Os cards de produto são inseridos aqui pelo inicio.js -->
      </div>
    </div>
  </section>

  <!-- Rodapé -->
  <footer class="rodape">
    <p>Bella Tavola &copy; 2026</p>
  </footer>

  <script src="js/dados.js"></script>
  <script src="js/armazenamento.js"></script>
  <script src="js/inicio.js"></script>
</body>
</html>
